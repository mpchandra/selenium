name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up JDK
      uses: actions/setup-java@v1
      with:
        java-version: '11'

    - name: Build with Maven
      run: mvn clean install

    - name: Run Allure Report
      run: |
        mvn allure:report
        mvn allure:serve

    - name: Publish Allure Results
      if: success()
      run: |
        mvn site
        mvn allure:report 
        mvn site -DskipTests 
        mvn allure:serve
