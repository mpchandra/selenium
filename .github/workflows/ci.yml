name: Java CI Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Install Chrome
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # ✅ Verify Chrome
      - name: Check Chrome version
        run: google-chrome --version

      # ✅ Run tests
      - name: Run Tests
        run: mvn clean test -Dheadless=true

      # ✅ Debug: Check Allure results (VERY IMPORTANT)
      - name: Check Allure Results
        run: |
          echo "Checking allure-results folder..."
          ls -R target/allure-results || echo "No allure results found!"

      # ✅ Generate Allure report
      - name: Generate Allure Report
        run: mvn allure:report

      # ✅ Debug: Check generated report
      - name: Check Allure Report Files
        run: |
          echo "Checking generated report..."
          ls -R target/site/allure-maven-plugin

      # ✅ Upload report
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin