name: Java CI Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Java setup
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Install Chrome
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # ✅ Verify Chrome
      - name: Check Chrome version
        run: google-chrome --version

      # ✅ Install Allure CLI (CRITICAL FIX)
      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      # ✅ Run tests
      - name: Run Tests
        run: mvn clean test -Dheadless=true

      # ✅ Debug Allure results
      - name: Check Allure Results
        run: |
          echo "Checking allure-results folder..."
          ls -R target/allure-results || (echo "No allure results found!" && exit 1)

      # ✅ Generate Allure report (FORCE correct path)
      - name: Generate Allure Report
        run: mvn allure:report -Dallure.results.directory=target/allure-results

      # ✅ Verify report exists (FAIL FAST if not)
      - name: Verify Allure Report
        run: |
          if [ -f "target/site/allure-maven-plugin/index.html" ]; then
            echo "Allure report generated successfully"
          else
            echo "Allure report NOT generated"
            exit 1
          fi

      # ✅ Debug report files
      - name: Check Allure Report Files
        run: |
          echo "Checking generated report..."
          ls -R target/site/allure-maven-plugin

      # ✅ Upload report
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin